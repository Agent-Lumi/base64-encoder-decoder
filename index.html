<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-color: #f5f7fa;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --border-color: #dfe6e9;
            --accent-color: #6c5ce7;
            --accent-hover: #5b4cdb;
            --secondary-bg: #f8f9fa;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --text-color: #eaeaea;
            --card-bg: #16213e;
            --border-color: #0f3460;
            --accent-color: #e94560;
            --accent-hover: #d63050;
            --secondary-bg: #1f2a4a;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
            animation: fadeInDown 0.6s ease-out;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease-out;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-color);
        }
        
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            resize: vertical;
            background: var(--secondary-bg);
            color: var(--text-color);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        button.primary {
            background: var(--accent-color);
            color: white;
        }
        
        button.primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.4);
        }
        
        button.primary:active {
            transform: translateY(0);
        }
        
        button.secondary {
            background: var(--secondary-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
        }
        
        button.secondary:hover {
            border-color: var(--accent-color);
            background: var(--card-bg);
        }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card-bg);
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(0,0,0,0.2);
        }
        
        .shortcuts-help {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 10px 15px;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: var(--shadow);
            font-size: 13px;
            cursor: pointer;
            border: none;
            color: var(--text-color);
            transition: transform 0.3s;
        }
        
        .shortcuts-help:hover {
            transform: translateY(-2px);
        }
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            max-width: 450px;
            width: 90%;
            animation: scaleIn 0.3s ease-out;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        
        .modal-content kbd {
            background: var(--secondary-bg);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            border: 1px solid var(--border-color);
            font-size: 0.9em;
        }
        
        .modal-content li {
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 10001;
            animation: slideInRight 0.3s ease-out;
            display: none;
        }
        
        .toast.show {
            display: block;
        }
        
        .toast.success {
            background: #00b894;
        }
        
        .toast.error {
            background: #e74c3c;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
                justify-content: center;
            }
            
            .theme-toggle {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
    
    <div class="container">
        <h1>🔐 Base64 Encoder/Decoder</h1>
        
        <div class="card">
            <div class="input-group">
                <label for="input">Input Text</label>
                <textarea id="input" placeholder="Enter text to encode or decode..." spellcheck="false"></textarea>
            </div>
            
            <div class="btn-group">
                <button class="primary" id="encodeBtn">⬆️ Encode to Base64</button>
                <button class="primary" id="decodeBtn">⬇️ Decode from Base64</button>
                <button class="secondary" id="clearBtn">🗑️ Clear</button>
                <button class="secondary" id="copyBtn">📋 Copy Result</button>
                <button class="secondary" id="swapBtn">🔄 Swap</button>
            </div>
            
            <div class="input-group">
                <label for="output">Output</label>
                <textarea id="output" placeholder="Result will appear here..." readonly spellcheck="false"></textarea>
            </div>
        </div>
    </div>
    
    <button class="shortcuts-help" id="shortcutsBtn">⌨️ Keyboard Shortcuts</button>
    
    <div class="modal" id="shortcutsModal">
        <div class="modal-content">
            <h3>⌨️ Keyboard Shortcuts</h3>
            <ul style="list-style: none;">
                <li><kbd>Ctrl + Enter</kbd> Encode</li>
                <li><kbd>Ctrl + Shift + Enter</kbd> Decode</li>
                <li><kbd>Ctrl + C</kbd> Copy output (when focused)</li>
                <li><kbd>Ctrl + D</kbd> Toggle dark mode</li>
                <li><kbd>Esc</kbd> Close modals</li>
            </ul>
            <button class="primary" id="closeModal" style="margin-top: 20px; width: 100%;">Close</button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeToggle.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
        
        // Base64 operations
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const encodeBtn = document.getElementById('encodeBtn');
        const decodeBtn = document.getElementById('decodeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const swapBtn = document.getElementById('swapBtn');
        const toast = document.getElementById('toast');
        
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        encodeBtn.addEventListener('click', () => {
            try {
                output.value = btoa(unescape(encodeURIComponent(input.value)));
                showToast('✅ Encoded successfully!');
            } catch (e) {
                showToast('❌ Encoding failed: ' + e.message, 'error');
            }
        });
        
        decodeBtn.addEventListener('click', () => {
            try {
                output.value = decodeURIComponent(escape(atob(input.value)));
                showToast('✅ Decoded successfully!');
            } catch (e) {
                showToast('❌ Invalid Base64 string!', 'error');
            }
        });
        
        clearBtn.addEventListener('click', () => {
            input.value = '';
            output.value = '';
            input.focus();
        });
        
        copyBtn.addEventListener('click', async () => {
            if (output.value) {
                await navigator.clipboard.writeText(output.value);
                showToast('📋 Copied to clipboard!');
            } else {
                showToast('⚠️ Nothing to copy!', 'error');
            }
        });
        
        swapBtn.addEventListener('click', () => {
            const temp = input.value;
            input.value = output.value;
            output.value = temp;
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + Enter = Encode
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                encodeBtn.click();
            }
            // Ctrl/Cmd + Shift + Enter = Decode
            else if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'Enter') {
                e.preventDefault();
                decodeBtn.click();
            }
            // Ctrl/Cmd + D = Toggle theme
            else if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
                e.preventDefault();
                themeToggle.click();
            }
            // Escape = Close modals
            else if (e.key === 'Escape') {
                shortcutsModal.classList.remove('show');
            }
        });
        
        // Shortcuts modal
        const shortcutsBtn = document.getElementById('shortcutsBtn');
        const shortcutsModal = document.getElementById('shortcutsModal');
        const closeModal = document.getElementById('closeModal');
        
        shortcutsBtn.addEventListener('click', () => {
            shortcutsModal.classList.add('show');
        });
        
        closeModal.addEventListener('click', () => {
            shortcutsModal.classList.remove('show');
        });
        
        shortcutsModal.addEventListener('click', (e) => {
            if (e.target === shortcutsModal) {
                shortcutsModal.classList.remove('show');
            }
        });
    </script>
</body>
</html>
